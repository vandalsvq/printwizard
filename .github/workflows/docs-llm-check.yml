name: docs-llm sync check

# Safety net на случай, если pre-commit hook был обойдён через --no-verify.
# Запускает build.py --check на любом PR / push, затрагивающем /docs или
# /docs-llm. Если /docs-llm не соответствует /docs — workflow падает.

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'docs-llm/**'
      - 'tools/docs-llm/**'
      - '.pre-commit-config.yaml'
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'docs-llm/**'
      - 'tools/docs-llm/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: |
          cd tools/docs-llm
          python -m unittest discover tests

      - name: Run docs-llm build check
        run: python3 tools/docs-llm/build.py --check

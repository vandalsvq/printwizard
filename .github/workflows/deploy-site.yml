name: Deploy site

# Собирает Astro Starlight-сайт (маркетинговый лендинг + документация) и деплоит:
#   1) build-yc        — npm build → dist/ → Yandex Object Storage (printwizard.ru) + сброс CDN.
#   2) build/deploy-gh — статическая заглушка gh-pages-stub/ → GitHub Pages
#                        (старый адрес документации редиректит на printwizard.ru).
# Источник документации — src/content/docs (см. CLAUDE.md / plans/pw-263).

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy-site"
  cancel-in-progress: true

jobs:
  build-yc:
    name: Build & deploy to Yandex Object Storage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build with Astro
        run: npm run build   # → dist/ (+ Pagefind-индекс, sitemap)

      - name: Deploy to Object Storage (s3 sync)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          aws s3 sync dist/ s3://printwizard.ru/ \
            --endpoint-url=https://storage.yandexcloud.net \
            --delete \
            --exact-timestamps

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i ${HOME}/yc -n
          echo "${HOME}/yc/bin" >> $GITHUB_PATH

      - name: Configure yc CLI
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          echo "$YC_SA_KEY" > /tmp/yc-sa-key.json
          yc config set service-account-key /tmp/yc-sa-key.json

      - name: Purge CDN cache
        env:
          YC_CDN_RESOURCE_ID: ${{ secrets.YC_CDN_RESOURCE_ID }}
        run: |
          yc cdn cache purge --resource-id "$YC_CDN_RESOURCE_ID" --all

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/yc-sa-key.json

  build-gh:
    name: Build GitHub Pages stub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload stub artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-stub

  deploy-gh:
    name: Deploy GitHub Pages stub
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-gh
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: docs-llm build

# Автоматически собирает /docs-llm из /docs:
# - На любой push в master (включая локальные merge'ы и прямые коммиты) —
#   запускает build, и если /docs-llm изменился, коммитит обновлённый
#   артефакт обратно в master с маркером [skip ci] (защита от
#   рекурсивного запуска workflow).
# - На PR с правкой /docs/** или /tools/docs-llm/** — запускает unit-тесты
#   и проверяет, что build не падает (валидаторы зелёные).
# - workflow_dispatch — ручной запуск из UI Actions для форс-пересборки.
#
# Локально build.py запускать не нужно.

on:
  # На push в master реагируем на любой коммит — paths-фильтр здесь
  # ненадёжен (merge-коммиты от локального git merge не всегда
  # распознаются как меняющие paths). Build идемпотентный: если
  # /docs-llm не изменился — автокоммит не выполняется. Защита от
  # рекурсии собственного автокоммита — [skip ci] в commit message.
  push:
    branches: [master]
  pull_request:
    paths:
      - 'docs/**'
      - 'tools/docs-llm/**'
  # Ручной запуск из UI Actions — на случай форс-пересборки.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Полная история нужна, чтобы git rev-parse HEAD в build.py
          # выдал актуальный SHA для заголовка bundle.
          fetch-depth: 0
          # Используем GITHUB_TOKEN для последующего push (на master).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: |
          cd tools/docs-llm
          python -m unittest discover tests

      - name: Build /docs-llm
        run: python3 tools/docs-llm/build.py

      - name: Show diff
        run: |
          git --no-pager diff --stat docs-llm/ || true
          git --no-pager diff docs-llm/ || true

      - name: Commit and push /docs-llm (only on master push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if git diff --quiet docs-llm/; then
            echo "Нет изменений в /docs-llm — коммит не требуется."
            exit 0
          fi
          git config user.name "docs-llm-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs-llm/
          git commit -m "docs-llm: автообновление [skip ci]" \
                     -m "Сгенерировано $GITHUB_WORKFLOW по коммиту $GITHUB_SHA."
          git push origin HEAD:master

      - name: PR check — fail if /docs/ изменён, но build не сходится
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet docs-llm/; then
            echo "PR-check OK: /docs-llm соответствует /docs (или ничего не правилось в docs/)."
          else
            echo "PR-check INFO: /docs-llm в этом PR устарел относительно /docs."
            echo "Это допустимо — после merge в master CI сгенерирует и закоммитит обновление."
            echo "Diff (для review):"
            git --no-pager diff --stat docs-llm/
          fi

name: docs-llm build

# Автоматически собирает /docs-llm из /docs:
# - На любой push в master — запускает build; если /docs-llm изменился,
#   создаёт/обновляет pull request "docs-llm: автообновление" с
#   результатом. После merge PR /docs-llm в master синхронен с /docs.
#   PR-flow выбран потому, что master защищён branch protection и
#   прямой push GITHUB_TOKEN'ом запрещён.
# - На PR с правкой /docs/** или /tools/docs-llm/** — запускает
#   unit-тесты и проверяет, что build не падает (валидаторы зелёные).
# - workflow_dispatch — ручной запуск из UI Actions.
#
# Локально build.py запускать не нужно.
#
# Требуется одноразовая настройка в GitHub:
#   Settings → Actions → General → Workflow permissions →
#     "Allow GitHub Actions to create and approve pull requests" — ON.

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - 'docs/**'
      - 'tools/docs-llm/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: |
          cd tools/docs-llm
          python -m unittest discover tests

      - name: Build /docs-llm
        run: python3 tools/docs-llm/build.py

      - name: Show diff
        run: |
          git --no-pager diff --stat docs-llm/ || true

      - name: Create or update PR with /docs-llm update (only on master push)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/docs-llm-auto-update
          base: master
          title: "docs-llm: автообновление"
          body: |
            Автоматическое обновление `/docs-llm` на основе master.

            Сгенерировано workflow `docs-llm build` для коммита
            ${{ github.sha }}.

            **Как мержить:**
            - Можно влить кнопкой Merge.
            - Если хотите чтобы PR'ы такого типа мержились автоматически —
              включите Auto-merge в настройках PR (или используйте
              приватный auto-merge action).

            **Что внутри:** только перегенерированные файлы из
            `/docs-llm/` (bundle.txt, index.json, listing.txt,
            topics/*.md). Остальные пути не затрагиваются.
          commit-message: "docs-llm: автообновление"
          author: "docs-llm-bot <actions@users.noreply.github.com>"
          committer: "docs-llm-bot <actions@users.noreply.github.com>"
          add-paths: docs-llm/
          delete-branch: true
          labels: |
            docs-llm
            automated

      - name: PR check — info only, не валит проверку
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet docs-llm/; then
            echo "PR-check OK: /docs-llm соответствует /docs."
          else
            echo "PR-check INFO: /docs-llm в этом PR устарел относительно /docs."
            echo "После merge в master workflow создаст автоматический PR с обновлением."
            echo "Diff (для review):"
            git --no-pager diff --stat docs-llm/
          fi
